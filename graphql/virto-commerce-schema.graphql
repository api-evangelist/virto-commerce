  saleWithTax: Money!
  actual: Money!
  actualWithTax: Money!
  discountAmount: Money!
  discountAmountWithTax: Money!
  discountPercent: Decimal!
  currency: String!
  startDate: DateTime
  endDate: DateTime
  tierPrices: [TierPrice]!
  discounts: [CatalogDiscount]!
