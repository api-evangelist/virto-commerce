}

# ─────────────────────────────────────────────
# Catalog — Search / Connection types
# ─────────────────────────────────────────────

type ProductConnection {
  totalCount: Int!
  items: [Product]
  pageInfo: PageInfo!
  edges: [ProductEdge]
  filter_facets: [FilterFacet]!
  range_facets: [RangeFacet]!
  term_facets: [TermFacet]!
}

type ProductEdge {
  cursor: String!
  node: Product
}

type CategoryConnection {
  totalCount: Int!
  items: [Category]
  pageInfo: PageInfo!
  edges: [CategoryEdge]
}

type CategoryEdge {
  cursor: String!
  node: Category
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type FilterFacet {
  name: String!
  label: String!
  count: Int!
}

type RangeFacet {
  name: String!
  label: String!
  ranges: [FacetRange]!
}

type FacetRange {
  from: Decimal
  to: Decimal
  count: Int!
  totalCount: Int!
  label: String!
  isSelected: Boolean!
  includeFrom: Boolean!
  includeTo: Boolean!
  fromId: String
  toId: String
  maxExcluding: Decimal
  maxIncluding: Decimal
  minExcluding: Decimal
  minIncluding: Decimal
}

type TermFacet {
  name: String!
  label: String!
  terms: [FacetTermType]!
}

type FacetTermType {
  term: String
  count: Int!
  isSelected: Boolean!
  label: String!
}

type ProductSuggestionsQueryResponse {
  suggestions: [String]
}

