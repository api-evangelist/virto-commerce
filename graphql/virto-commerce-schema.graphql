  deleteMemberAddresses(command: InputDeleteMemberAddressType!): MemberType
  createOrganization(command: InputCreateOrganizationType!): Organization
  updateOrganization(command: InputUpdateOrganizationType!): Organization
  inviteUser(command: InputInviteUserType!): CustomIdentityResultType
  registerByInvitation(command: InputRegisterByInvitationType!): CustomIdentityResultType
  createUser(command: InputCreateUserType!): IdentityResultType
  updateUser(command: InputUpdateUserType!): IdentityResultType
  deleteUsers(command: InputDeleteUserType!): IdentityResultType
  changePassword(command: InputChangePasswordType!): CustomIdentityResultType
  resetPasswordByToken(command: InputResetPasswordByTokenType!): CustomIdentityResultType
  sendVerifyEmail(command: InputSendVerifyEmailType!): Boolean
