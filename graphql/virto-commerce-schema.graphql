  productType: String
  minQuantity: Int
  maxQuantity: Int
  packSize: Int!
  relevanceScore: Decimal
  isConfigurable: Boolean!
  slug: String
  name: String!
  metaTitle: String
  metaDescription: String
  metaKeywords: String
  brandName: String
  imgSrc: String
  outerId: String
  gtin: String
  hasVariations: Boolean!
  inWishlist: Boolean!
  wishlistIds: [String]!
  category: Category
  masterVariation: Variation
  variations: [Variation]!
  images: [Image]!
  assets: [Asset]!
  price(cultureName: String, currencyCode: String): Price!
  prices(cultureName: String, currencyCode: String): [Price]!
  properties(filterByTypes: [String]): [Property]!
  propertyGroups: [PropertyGroup]!
  descriptions(cultureName: String): [Description]!
  description(cultureName: String, type: String): Description
  availabilityData: AvailabilityData!
  breadcrumbs: [Breadcrumb]!
  outlines: [Outline]
  seoInfo: SeoInfo
  associations(first: Int, after: String, query: String, group: String): ProductAssociationConnection
  relatedProducts(first: Int, after: String, query: String, group: String): ProductConnection
