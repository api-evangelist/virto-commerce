# Virto Commerce GraphQL Schema (SDL)
# Derived from open-source module source code:
#   https://github.com/VirtoCommerce/vc-module-x-catalog
#   https://github.com/VirtoCommerce/vc-module-x-cart
#   https://github.com/VirtoCommerce/vc-module-x-order
#   https://github.com/VirtoCommerce/vc-module-profile-experience-api
# Schema reflects confirmed types from the GraphQL.NET C# type definitions.

scalar DateTime
scalar Long
scalar Decimal
scalar Any

# ─────────────────────────────────────────────
# Shared / Money
# ─────────────────────────────────────────────

type Money {
  amount: Decimal!
  currency: Currency!
  decimalDigits: Int!
  formattedAmount: String!
  formattedAmountWithoutPoint: String!
  formattedAmountWithoutCurrency: String!
}

type Currency {
  code: String!
  symbol: String!
  englishName: String!
  exchangeRate: Decimal!
  customFormatting: String
}

type TierPrice {
  price: Money!
  priceWithTax: Money!
  quantity: Long!
}

type TaxDetail {
  rate: Decimal!
  amount: Decimal!
  name: String!
}

type DynamicProperty {
  id: String
  name: String
  value: Any
  valueType: String
  displayOrder: Int
}

# ─────────────────────────────────────────────
# Catalog — Assets, Images, Properties
# ─────────────────────────────────────────────

type Image {
  id: String
  url: String
  name: String
  description: String
  sortOrder: Int
  cultureName: String
  group: String
}

type Asset {
  id: String
  url: String!
  name: String
  description: String
  size: Int
  mimeType: String
  typeId: String
  group: String
  sortOrder: Int
  cultureName: String
}

type Property {
  id: String
  name: String!
  value: Any
  valueId: String
  valueType: String
  type: PropertyTypeEnum
  label: String
  displayOrder: Int
  isHidden: Boolean!
  isMultivalue: Boolean!
  isDictionary: Boolean!
  isMultilanguage: Boolean!
  dictionaryItems(first: Int, after: String): PropertyDictionaryItemConnection
}

enum PropertyTypeEnum {
  Product
  Variation
  Category
  Catalog
}

type PropertyDictionaryItem {
  id: String!
  alias: String!
  value: String
  sortOrder: Int!
}

type PropertyDictionaryItemConnection {
  totalCount: Int
  items: [PropertyDictionaryItem]
}

type PropertyGroup {
  name: String
  properties: [Property]
}

type OutlineItem {
  id: String!
  name: String!
  seoObjectType: String
  seoInfos: [SeoInfo]
  hasParent: Boolean!
}

type Outline {
  items: [OutlineItem]
}

type SeoInfo {
  id: String
  semanticUrl: String
  pageTitle: String
  metaDescription: String
  imageAltDescription: String
  metaKeywords: String
  storeId: String
  languageCode: String
  isActive: Boolean
  objectId: String
  objectType: String
}

type Description {
  id: String
  reviewType: String
  content: String!
  languageCode: String!
}

type Video {
  name: String!
  description: String
  uploadDate: DateTime
  thumbnailUrl: String!
  contentUrl: String!
  embedUrl: String
  duration: String
  cultureName: String
}

# ─────────────────────────────────────────────
# Catalog — Availability and Inventory
# ─────────────────────────────────────────────

type InventoryInfo {
  inStockQuantity: Long!
  reservedQuantity: Long!
  fulfillmentCenterId: String!
  fulfillmentCenterName: String!
  allowPreorder: Boolean!
  allowBackorder: Boolean!
